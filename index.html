<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>불러오는 중...</title>
</head>
<body>
  <p>불러오는 중...</p>

  <script>
    async function boot() {
      try {
        const res = await fetch('./current.json?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('current.json을 읽지 못했습니다.');

        const manifest = await res.json();
        const file = String(manifest.currentFile || '').trim();
        if (!file) throw new Error('current.json의 currentFile 값이 비어 있습니다.');

        location.replace(`./app.html?file=${encodeURIComponent(file)}`);
      } catch (err) {
        document.body.innerHTML = `<pre>${err.message}</pre>`;
      }
    }

    boot();
  </script>
</body>
</html>
