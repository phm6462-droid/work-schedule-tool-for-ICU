<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>근무표 도구</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #b8c2d1;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --shift: #7c3aed;
      --shift-soft: #ede9fe;
      --ok: #065f46;
      --warn: #92400e;
      --font-scale: 1;
      --ui-font-size: calc(14px * var(--font-scale));
      --ui-gap: calc(8px * var(--font-scale));
      --ui-radius: calc(10px * var(--font-scale));
      --ui-control-height: calc(36px * var(--font-scale));
      --calendar-min-width: 860px;
      --calendar-day-min-height: 102px;
      --calendar-weekday-height: 20px;
      --calendar-day-pad-y: 3px;
      --calendar-day-pad-x: 1px;
      --calendar-date-font-size: 13px;
      --calendar-shift-font-size: 11px;
      --calendar-coworker-font-size: 12px;
      --calendar-coworker-line-height: 1.35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--ui-font-size);
      line-height: 1.35;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(24px * var(--font-scale));
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: calc(16px * var(--font-scale));
      padding: calc(16px * var(--font-scale));
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 8px;
    }
    input[type="file"], input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      font-size: 14px;
    }
    .hint, .status {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .status {
      margin-top: 10px;
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
      white-space: pre-wrap;
    }
    .status:empty {
      display: none;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      background: #fff;
    }
    .selected-people {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 4px 0 8px;
    }
    .person-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .pill-x {
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: var(--muted);
      padding: 0;
    }
    .tabbar {
      display: flex;
      gap: 8px;
      margin: 0 0 10px;
      flex-wrap: wrap;
    }
    .tabbar button {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .tabbar button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .section-title {
      font-size: 17px;
      font-weight: 800;
      margin: 8px 0 12px;
    }
    .calendar-shell {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 1px;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 2px;
      min-width: 630px;
    }
    .calendar.personal-tight {
      gap: 0;
    }
    .weekday, .day {
      background: white;
      border: 1.5px solid var(--line);
      border-radius: calc(8px * var(--font-scale));
      min-height: calc(var(--calendar-day-min-height) * var(--font-scale));
      padding: calc(var(--calendar-day-pad-y) * var(--font-scale)) calc(var(--calendar-day-pad-x) * var(--font-scale));
    }
    .calendar.personal-tight .weekday,
    .calendar.personal-tight .day {
      border-radius: 0;
      padding: 1px 0;
    }
    .calendar.personal-tight .day {
      display: grid;
      grid-template-rows: auto auto 1fr;
      justify-items: center;
      align-content: start;
      row-gap: 1px;
    }
    .day.shift-focus {
      border: 2px solid var(--shift);
      box-shadow: inset 0 0 0 1px rgba(124, 58, 237, 0.15);
    }
    .weekday {
      min-height: calc(var(--calendar-weekday-height) * var(--font-scale));
      height: calc(var(--calendar-weekday-height) * var(--font-scale));
      text-align: center;
      font-weight: 800;
      background: #f8fafc;
      padding: 0 calc(1px * var(--font-scale));
      line-height: 1;
      border-radius: calc(4px * var(--font-scale));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .weekday.sun, .day.sun, .day.holiday {
      background: #fee2e2;
    }
    .weekday.sat, .day.sat {
      background: #dbeafe;
    }
    .day.empty {
      background: transparent;
      border-style: dashed;
    }
    .date {
      font-weight: 800;
      font-size: var(--calendar-date-font-size);
      margin-bottom: 6px;
    }
    .shift {
      display: inline-block;
      width: fit-content;
      padding: 0.12em 0.5em;
      border-radius: 999px;
      background: var(--shift-soft);
      color: var(--shift);
      font-weight: 800;
      font-size: var(--calendar-shift-font-size);
      text-align: center;
      margin: 0;
    }
    .coworkers {
      font-size: var(--calendar-coworker-font-size);
      line-height: var(--calendar-coworker-line-height);
      color: var(--text);
      white-space: normal;
    }
    .me-name {
      color: var(--accent);
      font-weight: 800;
    }
    .date-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin: 0 auto 2px;
      text-align: center;
      width: auto;
      max-width: 100%;
      white-space: nowrap;
    }
    .date-row .date {
      margin-bottom: 0;
    }
    .calendar.personal-tight .date-row {
      gap: 4px;
      padding: 0;
      width: auto;
      margin-left: auto;
      margin-right: auto;
    }
    .calendar.personal-tight .coworkers {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      width: max-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 0 1px;
      text-align: left;
      line-height: 1.42;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      align-self: stretch;
      flex: 1 1 auto;
      min-height: 0;
    }
    .coworker-line {
      display: block;
      width: auto;
      max-width: 100%;
    }
    #printRoot {
      display: none;
    }
    .muted { color: var(--muted); }
    .table-wrap { overflow: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      white-space: pre-wrap;
    }
    th { background: #f8fafc; }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .small { font-size: 12px; color: var(--muted); }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .section-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .shift-stats {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
      word-break: break-word;
      margin: 0;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .multi-check-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px 12px;
    }
    .multi-check-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .multi-check-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
      max-height: 220px;
      overflow: auto;
    }
    .multi-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
    .multi-check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .multi-check-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .multi-check-empty {
      font-size: 13px;
      color: var(--muted);
    }
    .overlap-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .capture-scope {
      background: white;
      border-radius: 12px;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: var(--ui-radius);
      padding: 0.5em 0.8em;
      font-size: inherit;
      font-weight: 700;
      min-height: var(--ui-control-height);
      cursor: pointer;
    }
    .btn:hover { border-color: #cbd5e1; }
    
    .compact-app.wrap {
      max-width: 1380px;
      padding: 6px 8px 8px;
    }
    .compact-grid.grid {
      grid-template-columns: 395px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }
    .control-card.card,
    .result-card.card {
      padding: 6px 8px;
      border-radius: 12px;
      min-width: 0;
    }
    .control-card {
      position: sticky;
      top: 6px;
      overflow: hidden;
    }
    .top-control-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: calc(8px * var(--font-scale));
      margin: 0 0 8px;
      min-width: 0;
    }
    .compact-tabbar.tabbar {
      margin: 0;
      flex: 1 1 auto;
      min-width: 0;
    }
    .compact-tabbar.tabbar button {
      padding: 7px 12px;
    }
    .control-row {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      align-items: center;
      column-gap: 10px;
      margin-bottom: 8px;
    }
    .inline-label {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }
    .inline-control {
      min-width: 0;
      overflow: hidden;
    }
    .upload-inline input[type="file"] {
      padding: 7px 10px;
      font-size: 13px;
    }
    .person-inline {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-width: 0;
    }
    .person-inline > * {
      min-width: 0;
      width: 100%;
    }
    .person-inline-wrap {
      min-width: 0;
    }
    .font-size-tools {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: calc(6px * var(--font-scale));
      flex-wrap: nowrap;
      flex: 0 0 auto;
    }
    .font-size-btn {
      min-width: calc(44px * var(--font-scale));
    }
    .person-clear-btn {
      white-space: nowrap;
      padding: 0.5em 0.8em;
      min-height: var(--ui-control-height);
    }
    input[type="file"], input[type="text"], select {
      padding: 0.5em 0.8em;
      border-radius: var(--ui-radius);
      font-size: inherit;
      min-height: var(--ui-control-height);
    }
    .visually-hidden {
      display: none !important;
    }
    .multi-section {
      margin-top: 2px;
    }
    .multi-head-row {
      align-items: center;
      margin-bottom: 4px;
    }
    .multi-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .mini-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: calc(9px * var(--font-scale));
      padding: 0.45em 0.8em;
      font-size: inherit;
      font-weight: 700;
      line-height: 1.2;
      min-height: var(--ui-control-height);
      cursor: pointer;
    }
    .mini-btn:hover {
      border-color: #cbd5e1;
    }
    .multi-check-wrap {
      margin-top: 0;
      padding: 4px 6px;
      border-radius: 10px;
    }
    .multi-check-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2px 8px;
      height: min(520px, calc(100vh - 150px));
      min-height: 160px;
      max-height: 520px;
      overflow: auto;
      resize: vertical;
      align-content: start;
      padding-right: 1px;
    }
    .multi-check-item {
      gap: 6px;
      padding: 2px 4px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 13px;
      line-height: 1.15;
    }
    .multi-check-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .multi-check-item input[type="checkbox"] {
      width: 15px;
      height: 15px;
    }
    .multi-check-name {
      font-weight: 700;
    }
    .chips {
      gap: 6px;
      margin-top: 8px;
    }
    .chip {
      padding: 5px 8px;
      font-size: 12px;
    }
    .status {
      margin-top: 8px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .section-head {
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .shift-stats {
      font-size: 12px;
      line-height: 1.3;
    }
    .stats-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .stats-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: calc(30px * var(--font-scale));
      padding: 0.4em 0.8em;
      border: 1.5px solid var(--line);
      border-radius: var(--ui-radius);
      background: #fff;
      font-size: inherit;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      cursor: pointer;
    }
    .stats-chip.active {
      border-color: var(--shift);
      background: var(--shift-soft);
      color: var(--shift);
    }
    .simple-overlap-summary {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 2px;
      line-height: 1.3;
    }
    .table-coworkers {
      min-width: 150px;
      text-align: center;
      vertical-align: middle;
    }
    .table-coworkers .coworkers-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      text-align: center;
      line-height: 1.3;
    }
    .table-coworkers .coworker-line {
      text-align: center;
      width: 100%;
    }
    .actions {
      gap: 6px;
    }
    .btn {
      padding: 7px 10px;
      font-size: 12px;
    }
    .capture-scope {
      border-radius: 10px;
    }
    .calendar-resize-frame {
      width: 100%;
      min-width: var(--frame-min-width, 640px);
      min-height: var(--frame-min-height, 420px);
      max-width: 100%;
      resize: both;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: calc(12px * var(--font-scale));
      padding: calc(2px * var(--font-scale));
      background: #fff;
    }
    .calendar-resize-frame .calendar-shell {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .calendar-resize-frame .calendar {
      min-width: 100%;
      width: 100%;
      height: 100%;
    }
    .calendar-resize-frame .day {
      min-height: var(--calendar-day-resize-height, var(--calendar-day-min-height));
    }
    .calendar-shell {
      padding-bottom: 0;
    }
    .calendar {
      min-width: var(--calendar-min-width);
    }
    .weekday, .day {
      min-height: var(--calendar-day-min-height);
      padding: var(--calendar-day-pad-y) var(--calendar-day-pad-x);
    }
    .weekday {
      padding: 0 var(--calendar-day-pad-x);
      min-height: var(--calendar-weekday-height);
      height: var(--calendar-weekday-height);
    }
    .calendar.personal-tight .weekday,
    .calendar.personal-tight .day {
      padding: var(--calendar-day-pad-y) var(--calendar-day-pad-x);
    }
    .calendar.personal-tight .day {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      row-gap: 0;
    }
    .date-row {
      margin-bottom: 0;
    }
    .date {
      margin-bottom: 1px;
      font-size: var(--calendar-date-font-size);
    }
    .shift {
      font-size: var(--calendar-shift-font-size);
      padding: 1px 6px;
      background: var(--shift-soft);
      color: var(--shift);
    }
    .coworkers {
      font-size: var(--calendar-coworker-font-size);
      line-height: var(--calendar-coworker-line-height);
      flex: 1 1 auto;
      min-height: 0;
    }
    .coworker-line {
      margin: 0;
    }
    .selected-people {
      display: block;
      gap: 0;
      margin: 0 0 2px;
      font-size: 12px;
      line-height: 1.35;
    }
    .person-pill {
      display: inline-flex;
      gap: 5px;
      padding: 2px 7px;
      font-size: 12px;
      margin: 0 4px 4px 0;
    }
    .overlap-wrap {
      gap: 2px;
    }
    .table-wrap {
      margin-top: 0;
    }
    table {
      font-size: 13px;
    }
    th, td {
      padding: 5px 6px;
      line-height: 1.3;
    }


    .calendar-tools {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .calendar-tool {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .calendar-tool input[type="range"] {
      width: 88px;
      margin: 0;
      accent-color: var(--accent);
    }
    .calendar-tool-value {
      min-width: 28px;
      text-align: right;
      color: var(--text);
      font-weight: 800;
    }
    .day[data-calendar-day] {
      cursor: pointer;
    }
    .day[data-calendar-day]:hover {
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.16);
    }
    .day-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      z-index: 1000;
      padding: 4px;
    }
    .day-modal[hidden] {
      display: none !important;
    }
    .day-modal-panel {
      width: min(1400px, calc(100vw - 4px));
      max-width: calc(100vw - 4px);
      max-height: min(90vh, 900px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.24);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .day-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }
    .day-modal-title {
      font-size: 16px;
      font-weight: 800;
    }
    .day-modal-close {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      min-width: 34px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
    }
    .day-modal-body {
      padding: 1px;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      justify-content: flex-start;
      gap: 1px;
      white-space: nowrap;
    }
    .day-modal-group {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0;
      background: #fff;
      flex: 0 0 138px;
      min-width: 138px;
      height: auto;
      white-space: normal;
      align-self: stretch;
      box-sizing: border-box;
    }
    .day-modal-group-head {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      margin: 0 0 1px;
      padding: 0;
      text-align: center;
    }
    .day-modal-names {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      line-height: 1.08;
      font-size: 13px;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .day-modal-names .coworker-line {
      display: block;
      width: 100%;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    body.modal-open {
      overflow: hidden;
    }

    body,
    button,
    input,
    select,
    table,
    th,
    td,
    .title,
    .sub,
    .card h2,
    .tabbar button,
    .inline-label,
    .hint,
    .status,
    .chip,
    .person-pill,
    .multi-check-item,
    .multi-check-empty,
    .simple-overlap-summary,
    .shift-stats,
    .small,
    .section-title,
    .calendar-tool,
    .calendar-tool-value,
    .date,
    .shift,
    .coworkers,
    .weekday,
    .day-modal-title,
    .day-modal-names,
    .day-modal-close {
      font-size: var(--ui-font-size) !important;
    }
    .actions,
    .stats-chips,
    .chips,
    .selected-people,
    .multi-toolbar,
    .control-row,
    .person-inline,
    .person-inline-wrap,
    .multi-check-list {
      gap: calc(8px * var(--font-scale));
    }
    .compact-app.wrap {
      padding: calc(6px * var(--font-scale)) calc(8px * var(--font-scale)) calc(8px * var(--font-scale));
    }
    .compact-grid.grid {
      gap: calc(8px * var(--font-scale));
    }
    .control-card.card,
    .result-card.card {
      padding: calc(8px * var(--font-scale)) calc(10px * var(--font-scale));
      border-radius: calc(12px * var(--font-scale));
    }
    .control-row {
      grid-template-columns: calc(108px * var(--font-scale)) minmax(0, 1fr);
      column-gap: calc(10px * var(--font-scale));
      margin-bottom: calc(8px * var(--font-scale));
    }
    .compact-tabbar.tabbar button {
      padding: 0.5em 0.8em;
    }
    .multi-check-wrap {
      padding: calc(4px * var(--font-scale)) calc(6px * var(--font-scale));
      border-radius: calc(10px * var(--font-scale));
    }
    .multi-check-list {
      min-height: calc(160px * var(--font-scale));
      max-height: min(calc(520px * var(--font-scale)), calc(100vh - 150px));
    }
    .section-head {
      margin-bottom: calc(4px * var(--font-scale));
    }
    .table-wrap table {
      width: 100%;
    }

    @media (max-width: 960px) {
      .grid, .two-cols { grid-template-columns: 1fr; }
      .wrap { padding: 10px; }
      .card { padding: 10px; }
      .compact-grid.grid { grid-template-columns: 1fr; }
      .control-card { position: static; }
      .control-row { grid-template-columns: 1fr; row-gap: 6px; }
      .top-control-bar { flex-wrap: wrap; }
      .person-inline-wrap { width: 100%; }
      .person-inline { grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr); }
      .multi-toolbar { justify-content: flex-start; }
      .calendar { min-width: 630px; gap: 2px; }
      .calendar.personal-tight { gap: 0; }
      .weekday, .day { min-height: 92px; padding: 6px; border-radius: 8px; }
      .calendar.personal-tight .weekday, .calendar.personal-tight .day { border-radius: 0; padding: 3px 0; }
      .weekday { padding: 2px 3px; border-radius: 6px; }
      .date { font-size: 13px; margin-bottom: 5px; }
      .shift { font-size: 11px; padding: 2px 7px; }
      .coworkers { font-size: 12px; line-height: 1.55; }
      .multi-check-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .day-modal {
        padding: 2px;
        align-items: stretch;
      }
      .day-modal-panel {
        width: calc(100vw - 8px);
        max-width: calc(100vw - 4px);
        max-height: calc(100vh - 8px);
        border-radius: 12px;
      }
      .day-modal-head {
        padding: 5px 6px;
      }
      .day-modal-body {
        padding: 1px;
        overflow-x: hidden;
        overflow-y: auto;
        flex-direction: column;
        flex-wrap: nowrap;
        gap: 1px;
        white-space: normal;
      }
      .day-modal-group {
        flex: none;
        width: 100%;
        min-width: 0;
        padding: 0;
      }
      .day-modal-group-head {
        margin-bottom: 1px;
        justify-content: center;
      }
      .day-modal-names {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 1px 6px;
        line-height: 1.1;
        text-align: center;
      }
      .day-modal-names .coworker-line {
        width: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
    }
    @media print {
      body { background: white; }
      body * { visibility: hidden !important; }
      #printRoot, #printRoot * { visibility: visible !important; }
      #printRoot {
        display: block !important;
        position: absolute;
        inset: 0;
        width: 100%;
        padding: 0;
        margin: 0;
      }
      #printRoot .calendar-shell { overflow: visible !important; }
      #printRoot .calendar { min-width: 0; width: 100%; gap: 2px; }
      #printRoot .weekday, #printRoot .day { min-height: 100px; break-inside: avoid; padding: 6px; }
      #printRoot .weekday { padding: 2px 4px; }
      #printRoot .btn, #printRoot .small { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap compact-app">
    <div class="grid compact-grid">
      <div class="card control-card">
        <div class="top-control-bar">
          <div class="tabbar compact-tabbar">
            <button class="tab active" data-tab="personal">개인 달력</button>
            <button class="tab" data-tab="overlap">공동 근무일</button>
          </div>
          <div class="font-size-tools" aria-label="글씨 크기 조절">
            <button type="button" class="mini-btn font-size-btn" id="decreaseFontBtn" title="글씨 줄이기">A-</button>
            <button type="button" class="mini-btn font-size-btn" id="increaseFontBtn" title="글씨 키우기">A+</button>
          </div>
        </div>

        <div class="control-row upload-row">
          <label for="fileInput" class="inline-label">근무 파일 업로드</label>
          <div class="inline-control upload-inline">
            <input id="fileInput" type="file" accept=".xls,.xlsx,.html,.htm" />
          </div>
        </div>

        <div class="control-row person-row">
          <label for="personSelect" class="inline-label">개인 조회</label>
          <div class="inline-control person-inline-wrap">
            <div class="person-inline">
              <input id="personSearch" type="text" placeholder="이름/초성 검색" disabled />
              <button type="button" class="mini-btn person-clear-btn" id="clearPersonSearchBtn">지우기</button>
              <select id="personSelect" disabled></select>
            </div>
          </div>
        </div>

        <div class="multi-section">
          <div class="control-row multi-head-row">
            <label for="multiSelect" class="inline-label">공동근무조회</label>
            <div class="multi-toolbar">
              <button type="button" class="mini-btn" id="clearMultiBtn">모두해제</button>
            </div>
          </div>
          <select id="multiSelect" multiple size="10" disabled class="visually-hidden" tabindex="-1" aria-hidden="true"></select>
          <div id="multiCheckboxWrap" class="multi-check-wrap">
            <div id="multiCheckboxList" class="multi-check-list">
              <div class="multi-check-empty">파일을 업로드하면 목록이 표시됩니다.</div>
            </div>
          </div>
        </div>

        <div id="summary" class="chips"></div>
        <div id="status" class="status">파일을 업로드해 주세요.</div>
      </div>

      <div class="card print-scope result-card">
        <div id="content"></div>
        <div id="printRoot" aria-hidden="true"></div>
      </div>
    </div>
  </div>


  <div id="dayDetailModal" class="day-modal" hidden>
    <div class="day-modal-panel" role="dialog" aria-modal="true" aria-labelledby="dayDetailTitle">
      <div class="day-modal-head">
        <div id="dayDetailTitle" class="day-modal-title">전체 근무</div>
        <button type="button" class="day-modal-close" id="closeDayDetailBtn" aria-label="닫기">×</button>
      </div>
      <div id="dayDetailBody" class="day-modal-body"></div>
    </div>
  </div>

  <script>
    const app = {
      records: [],
      names: [],
      year: null,
      month: null,
      activeTab: 'personal',
      fileName: '',
      preselectedPerson: '',
      activeShiftFilter: '',
      fontScale: 1,
      calendarFrames: {
        personal: { width: null, height: null },
        overlap: { width: null, height: null }
      },
      dayDetailHighlightNames: [],
      holidays: new Set()
    };

    const fileInput = document.getElementById('fileInput');
    const personSearch = document.getElementById('personSearch');
    const personSelect = document.getElementById('personSelect');
    const clearPersonSearchBtn = document.getElementById('clearPersonSearchBtn');
    const decreaseFontBtn = document.getElementById('decreaseFontBtn');
    const increaseFontBtn = document.getElementById('increaseFontBtn');
    const multiSelect = document.getElementById('multiSelect');
    const multiCheckboxWrap = document.getElementById('multiCheckboxWrap');
    const multiCheckboxList = document.getElementById('multiCheckboxList');
    const clearMultiBtn = document.getElementById('clearMultiBtn');
    const statusBox = document.getElementById('status');
    const content = document.getElementById('content');
    const summary = document.getElementById('summary');
    const printRoot = document.getElementById('printRoot');
    const dayDetailModal = document.getElementById('dayDetailModal');
    const dayDetailTitle = document.getElementById('dayDetailTitle');
    const dayDetailBody = document.getElementById('dayDetailBody');
    const closeDayDetailBtn = document.getElementById('closeDayDetailBtn');

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        app.activeTab = btn.dataset.tab;
        render();
      });
    });

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        setStatus('파일을 읽는 중입니다...');
        const rows = await parseFile(file);
        app.fileName = file.name || '';
        const parsed = extractSchedule(rows, app.fileName);
        app.records = parsed.records;
        app.names = parsed.names;
        app.year = parsed.year;
        app.month = parsed.month;
        app.preselectedPerson = guessPersonFromFileName(app.fileName, parsed.names);
        app.activeShiftFilter = '';
        app.holidays = await loadKoreanHolidays(app.year);
        bindSelectors();
        renderSummary(parsed);
        setStatus('');
        render();
      } catch (err) {
        console.error(err);
        setStatus('파일 처리 중 오류가 발생했습니다.\n' + err.message);
      }
    });

    personSearch.addEventListener('input', () => {
      bindPersonOptions(personSearch.value || '');
      render();
    });
    personSelect.addEventListener('change', () => {
      render();
    });
    multiSelect.addEventListener('change', () => {
      syncMultiCheckboxStateFromSelect();
      render();
    });

    if (clearMultiBtn) clearMultiBtn.addEventListener('click', clearMultiSelection);
    if (decreaseFontBtn) decreaseFontBtn.addEventListener('click', () => changeFontScale(-0.1));
    if (increaseFontBtn) increaseFontBtn.addEventListener('click', () => changeFontScale(0.1));
    if (clearPersonSearchBtn) clearPersonSearchBtn.addEventListener('click', () => {
      personSearch.value = '';
      bindPersonOptions('');
      render();
      personSearch.focus();
    });

    if (closeDayDetailBtn) closeDayDetailBtn.addEventListener('click', closeDayDetailModal);
    if (dayDetailModal) dayDetailModal.addEventListener('click', (e) => {
      if (e.target === dayDetailModal) closeDayDetailModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && dayDetailModal && !dayDetailModal.hidden) closeDayDetailModal();
    });
    applyUISizing();


    function applyUISizing() {
      const fontScale = Math.min(1.8, Math.max(0.8, Number(app.fontScale || 1)));
      const root = document.documentElement.style;
      root.setProperty('--font-scale', String(fontScale));
      root.setProperty('--ui-font-size', `${14 * fontScale}px`);
      root.setProperty('--ui-gap', `${8 * fontScale}px`);
      root.setProperty('--ui-radius', `${10 * fontScale}px`);
      root.setProperty('--ui-control-height', `${36 * fontScale}px`);
      root.setProperty('--calendar-min-width', `630px`);
      root.setProperty('--calendar-day-min-height', `102px`);
      root.setProperty('--calendar-weekday-height', `20px`);
      root.setProperty('--calendar-day-pad-y', `3px`);
      root.setProperty('--calendar-day-pad-x', `1px`);
      root.setProperty('--calendar-date-font-size', `${14 * fontScale}px`);
      root.setProperty('--calendar-shift-font-size', `${14 * fontScale}px`);
      root.setProperty('--calendar-coworker-font-size', `${14 * fontScale}px`);
      root.setProperty('--calendar-coworker-line-height', `1.35`);
      syncCalendarResizeFrames();
    }

    function changeFontScale(delta) {
      app.fontScale = Math.min(1.8, Math.max(0.8, Number((Number(app.fontScale || 1) + delta).toFixed(2))));
      applyUISizing();
    }

    function getCalendarFrameState(tabKey) {
      return (app.calendarFrames && app.calendarFrames[tabKey]) || { width: null, height: null };
    }

    function getCalendarRowCount() {
      if (!app.year || !app.month) return 6;
      const totalDays = new Date(app.year, app.month, 0).getDate();
      const firstDay = new Date(app.year, app.month - 1, 1).getDay();
      return Math.ceil((firstDay + totalDays) / 7);
    }

    function getRecommendedCalendarMetrics(items = [], options = {}) {
      const rowCount = getCalendarRowCount();
      const fontScale = Number(app.fontScale || 1);
      const maxCoworkers = items.reduce((maxCount, item) => {
        if (!item || item.shift === 'OFF') return maxCount;
        const count = Array.isArray(item.coworkers) ? item.coworkers.length : 0;
        return Math.max(maxCount, count);
      }, 0);
      const coworkerCount = options.showCoworkers ? Math.max(1, maxCoworkers) : 1;
      const baseDayHeight = 42 + (coworkerCount * 16 * fontScale);
      const dayHeight = Math.max(102 * fontScale, baseDayHeight);
      const weekdayHeight = 20 * fontScale;
      const defaultHeight = Math.max(420 * fontScale, 18 + weekdayHeight + (rowCount * dayHeight));
      const minHeight = Math.max(400 * fontScale, defaultHeight);
      const minWidth = Math.max(860 * fontScale, 760);
      return {
        minWidth,
        minHeight,
        defaultHeight
      };
    }

    function renderResizableCalendar(calendarMarkup, tabKey, captureId, items = [], options = {}) {
      const frame = getCalendarFrameState(tabKey);
      const metrics = getRecommendedCalendarMetrics(items, options);
      const widthStyle = frame.width ? `width:${Math.max(Math.round(frame.width), Math.round(metrics.minWidth))}px;` : 'width:100%;';
      const heightStyle = `height:${Math.max(Math.round(frame.height || metrics.defaultHeight), Math.round(metrics.minHeight))}px;`;
      return `
        <div id="${captureId}" class="capture-scope">
          <div class="calendar-resize-frame" data-calendar-frame="${tabKey}" style="--frame-min-width:${Math.round(metrics.minWidth)}px;--frame-min-height:${Math.round(metrics.minHeight)}px;${widthStyle}${heightStyle}">
            ${calendarMarkup}
          </div>
        </div>
      `;
    }

    let calendarFrameResizeObserver = null;
    function bindCalendarFrameResize(tabKey) {
      if (calendarFrameResizeObserver) calendarFrameResizeObserver.disconnect();
      const frame = document.querySelector(`[data-calendar-frame="${tabKey}"]`);
      if (!frame || !window.ResizeObserver) return;

      const syncFrameMetrics = () => {
        const frameWidth = Math.max(frame.clientWidth, frame.getBoundingClientRect().width || 0);
        const frameHeight = Math.max(frame.clientHeight, frame.getBoundingClientRect().height || 0);
        if (!app.calendarFrames) app.calendarFrames = {};
        if (!app.calendarFrames[tabKey]) app.calendarFrames[tabKey] = { width: null, height: null };
        app.calendarFrames[tabKey].width = frameWidth;
        app.calendarFrames[tabKey].height = frameHeight;

        const weekdayHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--calendar-weekday-height')) || 20;
        const rowCount = getCalendarRowCount();
        const gapTotal = Math.max(0, rowCount + 1) * 2;
        const availableHeight = Math.max(260, frameHeight - weekdayHeight - gapTotal - 6);
        const dayHeight = Math.max(82, availableHeight / rowCount);
        frame.style.setProperty('--calendar-day-resize-height', `${dayHeight}px`);
      };

      syncFrameMetrics();
      calendarFrameResizeObserver = new ResizeObserver(syncFrameMetrics);
      calendarFrameResizeObserver.observe(frame);
    }

    function syncCalendarResizeFrames() {
      const activeFrame = document.querySelector('[data-calendar-frame]');
      if (!activeFrame) return;
      const tabKey = activeFrame.getAttribute('data-calendar-frame');
      if (tabKey) bindCalendarFrameResize(tabKey);
    }

    function bindCalendarDayEvents(highlightedNames = []) {
      app.dayDetailHighlightNames = Array.isArray(highlightedNames) ? [...highlightedNames] : [];
      content.querySelectorAll('[data-calendar-day]').forEach(cell => {
        cell.addEventListener('dblclick', () => {
          const day = Number(cell.getAttribute('data-calendar-day') || '0');
          if (!day) return;
          openDayDetailModal(day, app.dayDetailHighlightNames);
        });
      });
    }

    function getShiftOrderValue(label) {
      const normalized = String(label || '').trim().toUpperCase();
      if (normalized === 'D1') return 0;
      if (normalized === 'E1') return 1;
      if (normalized === 'N1') return 2;
      if (normalized === 'OFF') return 3;
      return 100;
    }

    function compareShiftLabels(a, b) {
      const orderDiff = getShiftOrderValue(a) - getShiftOrderValue(b);
      if (orderDiff !== 0) return orderDiff;
      return String(a || '').localeCompare(String(b || ''), 'ko', { numeric: true });
    }

    function getDayRecords(day) {
      return app.records
        .filter(record => record.day === day)
        .sort((a, b) => compareShiftLabels(getShiftLabel(a), getShiftLabel(b)) || a.name.localeCompare(b.name, 'ko'));
    }

    function getDayShiftGroups(day) {
      const groups = new Map();
      for (const record of getDayRecords(day)) {
        const label = getShiftLabel(record) || record.shift || '';
        if (!groups.has(label)) groups.set(label, []);
        groups.get(label).push(record.name);
      }
      return Array.from(groups.entries())
        .sort((a, b) => compareShiftLabels(a[0], b[0]))
        .map(([shift, names]) => ({ shift, names: [...names].sort((x, y) => x.localeCompare(y, 'ko')) }));
    }

    function openDayDetailModal(day, highlightedNames = []) {
      const groups = getDayShiftGroups(day);
      const dateText = `${app.year}-${String(app.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      dayDetailTitle.textContent = `${dateText} 전체 근무`;
      if (!groups.length) {
        dayDetailBody.innerHTML = '<div class="muted">표시할 근무가 없습니다.</div>';
      } else {
        dayDetailBody.innerHTML = groups.map(group => `
          <div class="day-modal-group">
            <div class="day-modal-group-head">
              <span class="shift">${escapeHtml(group.shift)}</span>
            </div>
            <div class="day-modal-names">${buildCoworkerHtml(group.names, highlightedNames)}</div>
          </div>
        `).join('');
      }
      dayDetailModal.hidden = false;
      document.body.classList.add('modal-open');
    }

    function closeDayDetailModal() {
      dayDetailModal.hidden = true;
      document.body.classList.remove('modal-open');
    }

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function renderSummary(parsed) {
      summary.innerHTML = '';
      const items = [
        `연월: ${parsed.year}-${String(parsed.month).padStart(2,'0')}`,
        `대상자: ${parsed.names.length}명`,
        `근무일수: ${parsed.dayCount}일`
      ];
      items.forEach(t => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.textContent = t;
        summary.appendChild(span);
      });
    }

    async function parseFile(file) {
      const buffer = await file.arrayBuffer();
      const name = file.name.toLowerCase();

      if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
        try {
          const wb = XLSX.read(buffer, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          return XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
        } catch (e) {
          // HTML disguised as xls fallback
        }
      }

      const text = new TextDecoder('utf-8').decode(buffer);
      return parseHtmlTable(text);
    }

    function parseHtmlTable(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const table = doc.querySelector('table');
      if (!table) throw new Error('HTML 표를 찾지 못했습니다.');
      const rows = [];
      table.querySelectorAll('tr').forEach(tr => {
        const row = [];
        tr.querySelectorAll('th, td').forEach(cell => {
          const text = (cell.textContent || '').replace(/\s+/g, ' ').trim();
          const colspan = parseInt(cell.getAttribute('colspan') || '1', 10);
          row.push(text);
          for (let i = 1; i < colspan; i++) row.push('');
        });
        rows.push(row);
      });
      return rows;
    }

    function extractSchedule(rows, fileName = '') {
      if (!rows || rows.length < 3) throw new Error('시트 구조를 해석할 수 없습니다.');

      const normalized = rows.map(r => r.map(v => String(v ?? '').trim()));
      const dayHeaderIdx = findDayHeaderRow(normalized);
      if (dayHeaderIdx < 0 || dayHeaderIdx + 1 >= normalized.length) throw new Error('날짜 헤더를 찾지 못했습니다.');

      const dayRow = normalized[dayHeaderIdx];
      const weekdayRow = normalized[dayHeaderIdx + 1] || [];
      const dayColumns = [];
      for (let c = 0; c < dayRow.length; c++) {
        if (/^\d{1,2}$/.test(dayRow[c])) dayColumns.push({ col: c, day: parseInt(dayRow[c], 10), weekday: weekdayRow[c] || '' });
      }
      if (!dayColumns.length) throw new Error('날짜 열을 찾지 못했습니다.');

      const { year, month } = inferYearMonth(normalized, dayColumns.length, fileName);
      const nameCol = findNameColumn(normalized, dayHeaderIdx, dayColumns[0].col);

      const dataStart = dayHeaderIdx + 2;
      const records = [];
      const nameSet = new Set();

      for (let r = dataStart; r < normalized.length; r++) {
        const row = normalized[r];
        if (!row || !row.some(Boolean)) continue;
        const name = extractName(row, nameCol, dayColumns[0].col);
        if (!name) continue;
        if (isMetaName(name)) continue;

        let hasShift = false;
        for (const dc of dayColumns) {
          const rawShift = (row[dc.col] || '').trim();
          const shift = normalizeShift(rawShift);
          if (!shift) continue;
          hasShift = true;
          records.push({
            name,
            day: dc.day,
            date: `${year}-${String(month).padStart(2,'0')}-${String(dc.day).padStart(2,'0')}`,
            weekday: dc.weekday,
            rawShift,
            shift,
          });
        }
        if (hasShift) nameSet.add(name);
      }

      const names = Array.from(nameSet);
      if (!names.length || !records.length) throw new Error('근무 데이터가 추출되지 않았습니다.');

      return { records, names, year, month, dayCount: dayColumns.length };
    }

    function findDayHeaderRow(rows) {
      for (let i = 0; i < Math.min(rows.length, 15); i++) {
        const count = rows[i].filter(v => /^\d{1,2}$/.test(v)).length;
        if (count >= 20) return i;
      }
      return -1;
    }

    function inferYearMonth(rows, dayCount, fileName = '') {
      const joined = rows.slice(0, 8).flat().join(' ');
      const textCandidates = [String(fileName || ''), joined];

      for (const text of textCandidates) {
        const m = text.match(/(20\d{2})[^\d]?(\d{2})/);
        if (m) {
          const year = parseInt(m[1], 10);
          const month = parseInt(m[2], 10);
          if (month >= 1 && month <= 12) return { year, month };
        }
      }

      for (const text of textCandidates) {
        const m = text.match(/(20\d{2})[-./년_\s]+(\d{1,2})/);
        if (m) {
          const year = parseInt(m[1], 10);
          const month = parseInt(m[2], 10);
          if (month >= 1 && month <= 12) return { year, month };
        }
      }

      const now = new Date();
      return { year: now.getFullYear(), month: now.getMonth() + 1 };
    }

    function findNameColumn(rows, dayHeaderIdx, dayStartCol) {
      const searchRows = rows.slice(0, Math.min(dayHeaderIdx + 2, 8));
      let fallback = -1;
      for (let c = 0; c < dayStartCol; c++) {
        const labels = searchRows.map(r => (r[c] || '').trim());
        if (labels.some(v => /^(근무자|이름|성명)$/.test(v))) return c;
        if (fallback < 0 && labels.some(v => /(근무자|이름|성명)/.test(v))) fallback = c;
      }
      if (fallback >= 0) return fallback;
      return Math.min(1, Math.max(0, dayStartCol - 1));
    }

    function extractName(row, nameCol, dayStartCol) {
      const direct = ((row[nameCol] || '') + '').trim();
      if (isLikelyPersonName(direct)) return direct;

      const candidates = row
        .slice(0, Math.min(dayStartCol, 6))
        .map(v => (v || '').trim())
        .filter(v => isLikelyPersonName(v));
      if (!candidates.length) return '';
      return candidates[0];
    }

    function isLikelyPersonName(value) {
      if (!value) return false;
      if (/^\d+$/.test(value)) return false;
      if (/^\d{4}[-./]\d{1,2}[-./]\d{1,2}$/.test(value)) return false;
      if (/^(중환자실|병동|부서|사번|입사일|직책)$/i.test(value)) return false;
      if (value.length > 12) return false;
      return /[가-힣A-Za-z]/.test(value);
    }

    function isMetaName(name) {
      const blocked = ['날짜', '근무', '합계', '통계', '비고', '구분'];
      return blocked.some(word => name.includes(word));
    }

    function normalizeShift(v) {
      if (!v) return '';
      const raw = String(v).replace(/\s+/g, '').trim();
      if (!raw) return '';
      const upper = raw.toUpperCase();
      if (/^(OFF|O|휴무|연차|반차|휴가|오프|X)$/.test(upper)) return 'OFF';
      return upper;
    }

    function getChoseong(text) {
      const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      return String(text || '').split('').map(ch => {
        const code = ch.charCodeAt(0);
        if (code >= 0xAC00 && code <= 0xD7A3) {
          return CHO[Math.floor((code - 0xAC00) / 588)] || ch;
        }
        return ch;
      }).join('');
    }

    function normalizeSearchText(text) {
      return String(text || '').trim().toLowerCase();
    }

    function isSubsequence(target, keyword) {
      if (!keyword) return true;
      let idx = 0;
      for (const ch of String(target || '')) {
        if (ch === keyword[idx]) idx += 1;
        if (idx >= keyword.length) return true;
      }
      return false;
    }

    function getPersonSearchScore(name, keyword) {
      const normalizedName = normalizeSearchText(name);
      const normalizedKeyword = normalizeSearchText(keyword);
      if (!normalizedKeyword) return 1;

      const choseongName = normalizeSearchText(getChoseong(normalizedName));
      let score = 0;

      if (normalizedName === normalizedKeyword) score = Math.max(score, 1000);
      if (choseongName === normalizedKeyword) score = Math.max(score, 980);
      if (normalizedName.startsWith(normalizedKeyword)) score = Math.max(score, 900 - Math.max(0, normalizedName.length - normalizedKeyword.length));
      if (choseongName.startsWith(normalizedKeyword)) score = Math.max(score, 880 - Math.max(0, choseongName.length - normalizedKeyword.length));
      if (normalizedName.includes(normalizedKeyword)) score = Math.max(score, 700 - normalizedName.indexOf(normalizedKeyword));
      if (choseongName.includes(normalizedKeyword)) score = Math.max(score, 680 - choseongName.indexOf(normalizedKeyword));
      if (isSubsequence(normalizedName, normalizedKeyword)) score = Math.max(score, 520 - (normalizedName.length - normalizedKeyword.length));
      if (isSubsequence(choseongName, normalizedKeyword)) score = Math.max(score, 500 - (choseongName.length - normalizedKeyword.length));

      return Math.max(score, 0);
    }

    function matchesPersonSearch(name, keyword) {
      return getPersonSearchScore(name, keyword) > 0;
    }


    async function loadKoreanHolidays(year) {
      try {
        const res = await fetch(`https://holidays.hyunbin.page/${year}.json`, { cache: 'no-store' });
        if (!res.ok) throw new Error('공휴일 데이터를 가져오지 못했습니다.');
        const data = await res.json();
        return new Set(Object.keys(data || {}));
      } catch (err) {
        console.warn('공휴일 로딩 실패', err);
        return new Set();
      }
    }

    function isHolidayDate(year, month, day) {
      const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      return app.holidays && app.holidays.has(key);
    }

    function guessPersonFromFileName(fileName, names = []) {
      const base = String(fileName || '').replace(/\.[^.]+$/, '').trim();
      if (!base || !Array.isArray(names) || !names.length) return '';
      const candidates = [...new Set(names)]
        .filter(Boolean)
        .sort((a, b) => b.length - a.length);
      const tokens = base.split(/\s+/).filter(Boolean);
      for (const token of tokens.slice().reverse()) {
        const matched = candidates.find(name => token === name);
        if (matched) return matched;
      }
      for (const name of candidates) {
        if (base.endsWith(` ${name}`) || base.includes(` ${name} `)) return name;
      }
      return '';
    }

    function buildCoworkerHtml(names = [], highlightedNames = []) {
      if (!Array.isArray(names) || !names.length) return '';
      const highlightSet = new Set(highlightedNames || []);
      return names.map((n, i) => {
        const line = `${i + 1}. ${escapeHtml(n)}`;
        return `<div class="coworker-line">${highlightSet.has(n) ? `<span class="me-name">${line}</span>` : line}</div>`;
      }).join('');
    }

      Array.from(multiSelect.options).forEach(opt => {

      render();

    function bindSelectors() {
      personSearch.value = app.preselectedPerson || '';
      bindPersonOptions(personSearch.value || '');
      if (app.preselectedPerson && app.names.includes(app.preselectedPerson)) {
        personSelect.value = app.preselectedPerson;
      }
      multiSelect.innerHTML = '';
      for (const name of app.names) {
        const opt2 = document.createElement('option');
        opt2.value = name;
        opt2.textContent = name;
        opt2.selected = false;
        multiSelect.appendChild(opt2);
      }
      personSearch.disabled = false;
      multiSelect.disabled = false;
      renderMultiCheckboxes();
      syncMultiCheckboxStateFromSelect();
    }

    function bindPersonOptions(filterText = '') {
      const prevValue = personSelect.value;
      const keyword = String(filterText || '').trim();
      const rankedNames = !keyword
        ? [...app.names]
        : app.names
            .map(name => ({ name, score: getPersonSearchScore(name, keyword) }))
            .filter(item => item.score > 0)
            .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'ko'))
            .map(item => item.name);

      personSelect.innerHTML = '';
      if (!rankedNames.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '검색 결과 없음';
        personSelect.appendChild(opt);
        personSelect.disabled = true;
        return;
      }

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '선택해주세요';
      personSelect.appendChild(placeholder);

      for (const name of rankedNames) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        personSelect.appendChild(opt);
      }

      personSelect.disabled = false;
      if (keyword) personSelect.value = rankedNames[0] || '';
      else if (rankedNames.includes(prevValue)) personSelect.value = prevValue;
      else personSelect.value = '';
    }

    function renderMultiCheckboxes() {
      multiCheckboxList.innerHTML = '';
      if (!app.names.length) {
        multiCheckboxList.innerHTML = '<div class="multi-check-empty">파일을 업로드하면 목록이 표시됩니다.</div>';
        return;
      }

      const fragment = document.createDocumentFragment();
      const selectedNames = new Set(Array.from(multiSelect.selectedOptions).map(o => o.value));
      for (const name of app.names) {
        const label = document.createElement('label');
        label.className = 'multi-check-item';
        if (selectedNames.has(name)) label.classList.add('active');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = name;
        checkbox.dataset.name = name;
        checkbox.checked = selectedNames.has(name);
        checkbox.disabled = multiSelect.disabled;

        const syncNameSelection = (checked) => {
          const option = Array.from(multiSelect.options).find(opt => opt.value === name);
          if (option) option.selected = checked;
          checkbox.checked = checked;
          label.classList.toggle('active', checked);
          render();
        };

        checkbox.addEventListener('click', (e) => e.stopPropagation());
        checkbox.addEventListener('change', () => {
          syncNameSelection(checkbox.checked);
        });
        label.addEventListener('click', (e) => {
          if (e.target === checkbox) return;
          e.preventDefault();
          syncNameSelection(!checkbox.checked);
        });

        const text = document.createElement('span');
        text.className = 'multi-check-name';
        text.textContent = name;

        label.appendChild(checkbox);
        label.appendChild(text);
        fragment.appendChild(label);
      }
      multiCheckboxList.appendChild(fragment);
    }

    function syncMultiCheckboxStateFromSelect() {
      const selectedNames = new Set(Array.from(multiSelect.selectedOptions).map(o => o.value));
      multiCheckboxList.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
        checkbox.checked = selectedNames.has(checkbox.value);
        checkbox.disabled = multiSelect.disabled;
        const item = checkbox.closest('.multi-check-item');
        if (item) item.classList.toggle('active', checkbox.checked);
      });
    }

    function getSelectedMultiNames() {
      return Array.from(multiSelect.selectedOptions).map(o => o.value);
    }

    function removeSelectedPerson(name) {
      Array.from(multiSelect.options).forEach(opt => {
        if (opt.value === name) opt.selected = false;
      });
      syncMultiCheckboxStateFromSelect();
      render();
    }

      if (pdfBtn) pdfBtn.addEventListener('click', async () => saveElementAsPdf(document.getElementById('personalCapture'), `${app.year}-${String(app.month).padStart(2,'0')}_${name}_개인근무달력.pdf`));

    function recordsForName(name) {
      return app.records.filter(r => r.name === name).sort((a, b) => a.day - b.day);
    }

    function getShiftLabel(record) {
      if (!record) return '';
      if (record.shift === 'OFF') return 'OFF';
      return String(record.rawShift || record.shift || '').trim();
    }

    function getShiftStats(records) {
      if (!records || !records.length) return [];
      const counts = new Map();
      for (const record of records) {
        const label = getShiftLabel(record);
        if (!label) continue;
        counts.set(label, (counts.get(label) || 0) + 1);
      }
      return Array.from(counts.entries())
        .sort((a, b) => compareShiftLabels(a[0], b[0]))
        .map(([label, count]) => ({ label, count, text: `${label} ${count}개` }));
    }

    function renderStatsChips(stats, activeShift = '') {
      if (!stats || !stats.length) return '<span class="stats-chip">근무유형 통계 없음</span>';
      return stats.map(item => {
        const activeClass = activeShift === item.label ? ' active' : '';
        return `<button type="button" class="stats-chip${activeClass}" data-shift-filter="${escapeHtml(item.label)}">${escapeHtml(item.text)}</button>`;
      }).join('');
    }

    function getNamesForDayShift(day, shift) {
      const matched = new Set(
        app.records
          .filter(r => r.day === day && r.shift === shift && r.shift !== 'OFF')
          .map(r => r.name)
      );
      return app.names.filter(n => matched.has(n));
    }

    function findOverlaps(names) {
      const selected = Array.from(new Set(names));
      const days = Array.from(new Set(
        app.records
          .filter(r => selected.includes(r.name))
          .map(r => r.day)
      )).sort((a, b) => a - b);

      const overlaps = [];
      for (const day of days) {
        const daily = selected.map(name => app.records.find(r => r.name === name && r.day === day));
        if (daily.some(x => !x)) continue;
        if (daily.some(x => x.shift === 'OFF')) continue;

        const normalizedShifts = Array.from(new Set(daily.map(x => x.shift)));
        if (normalizedShifts.length !== 1) continue;

        overlaps.push({
          day,
          shift: daily[0].rawShift || daily[0].shift,
          date: `${app.year}-${String(app.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`,
          coworkers: getNamesForDayShift(day, daily[0].shift),
          members: daily.map(x => `${x.name}(${x.rawShift || x.shift})`)
        });
      }
      return overlaps;
    }

    async function captureElement(element) {
      if (!element) throw new Error('저장할 영역을 찾지 못했습니다.');
      const canvas = await html2canvas(element, {
        backgroundColor: '#ffffff',
        scale: Math.max(2, window.devicePixelRatio || 1),
        useCORS: true,
        logging: false,
        scrollX: 0,
        scrollY: -window.scrollY,
        windowWidth: document.documentElement.scrollWidth,
      });
      return canvas;
    }

    async function saveElementAsPng(element, filename) {
      try {
        const canvas = await captureElement(element);
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = filename;
        link.click();
      } catch (err) {
        alert('PNG 저장 중 오류가 발생했습니다. ' + err.message);
      }
    }

    async function saveElementAsPdf(element, filename) {
      try {
        const canvas = await captureElement(element);
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: canvas.width >= canvas.height ? 'landscape' : 'portrait', unit: 'px', format: [canvas.width, canvas.height] });
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save(filename);
      } catch (err) {
        alert('PDF 저장 중 오류가 발생했습니다. ' + err.message);
      }
    }

    async function printElementAsImage(element, title) {
      try {
        const canvas = await captureElement(element);
        const imgData = canvas.toDataURL('image/png');
        const win = window.open('', '_blank');
        if (!win) throw new Error('팝업이 차단되어 프린트 창을 열지 못했습니다.');
        win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title><style>html,body{margin:0;padding:0;background:#fff;}img{display:block;width:100%;height:auto;} @page{margin:8mm; size:auto;} </style></head><body><img src="${imgData}" alt="print"></body></html>`);
        win.document.close();
        win.onload = () => {
          win.focus();
          win.print();
        };
      } catch (err) {
        alert('프린트 준비 중 오류가 발생했습니다. ' + err.message);
      }
    }

    function calendarHtml(items, options = {}) {
      const totalDays = new Date(app.year, app.month, 0).getDate();
      const firstDay = new Date(app.year, app.month - 1, 1).getDay();
      const map = new Map(items.map(item => [item.day, item]));
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      const calendarClass = options.personalTight ? 'calendar personal-tight' : 'calendar';
      let html = `<div class="calendar-shell"><div class="${calendarClass}">`;
      html += weekdays.map((d, idx) => {
        const cls = idx === 0 ? 'weekday sun' : idx === 6 ? 'weekday sat' : 'weekday';
        return `<div class="${cls}">${d}</div>`;
      }).join('');
      for (let i = 0; i < firstDay; i++) html += '<div class="day empty"></div>';
      for (let day = 1; day <= totalDays; day++) {
        const item = map.get(day);
        const weekIdx = new Date(app.year, app.month - 1, day).getDay();
        const classes = ['day'];
        if (weekIdx === 0) classes.push('sun');
        else if (weekIdx === 6) classes.push('sat');
        else if (isHolidayDate(app.year, app.month, day)) classes.push('holiday');
        if (item && options.highlightedShift && ((item.shiftLabel || item.rawShift || item.shift || '') === options.highlightedShift)) classes.push('shift-focus');
        const className = classes.join(' ');
        if (!item && options.onlyMarkedDays) {
          html += `<div class="${className}" data-calendar-day="${day}" title="더블클릭하면 ${app.year}-${String(app.month).padStart(2,'0')}-${String(day).padStart(2,'0')} 전체 근무를 봅니다"><div class="date">${day}</div><div class="muted">${escapeHtml(options.blankText || '-')}</div></div>`;
          continue;
        }
        if (!item) {
          html += `<div class="${className}" data-calendar-day="${day}" title="더블클릭하면 ${app.year}-${String(app.month).padStart(2,'0')}-${String(day).padStart(2,'0')} 전체 근무를 봅니다"><div class="date">${day}</div><div class="muted">근무 없음</div></div>`;
          continue;
        }
        html += `
          <div class="${className}" data-calendar-day="${day}" title="더블클릭하면 ${app.year}-${String(app.month).padStart(2,'0')}-${String(day).padStart(2,'0')} 전체 근무를 봅니다">
            <div class="date-row">
              <div class="date">${day}</div>
              <div class="shift">${escapeHtml(item.rawShift || item.shift || '')}</div>
            </div>
            ${options.showCoworkers ? `<div class="coworkers">${'coworkerHtml' in item ? item.coworkerHtml : escapeHtml(item.coworkerLabel || (item.coworkers && item.coworkers.length ? item.coworkers.join(', ') : '없음')).replaceAll('\n', '<br>')}</div>` : ''}
          </div>
        `;
      }
      html += '</div></div>';
      return html;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
